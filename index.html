<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Scull Analyser</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@500;600;700&display=swap');
  
  :root {
    --bg: #0b0e13; --s1: #111520; --s2: #181d2a; --s3: #1e2434;
    --border: #242c40; --dim: #1a2030;
    --g: #3affb4; --b: #4da6ff; --y: #ffc947; --r: #ff6b6b; --p: #c084fc;
    --text: #d8e0f0; --muted: #5a6480; --faint: #2d3450;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body { 
    background: var(--bg); 
    color: var(--text); 
    font-family: 'IBM Plex Mono', monospace; 
    font-size: 13px; 
    overflow-x: hidden; 
  }

  #hdr { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--s1); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 200; flex-wrap: wrap; }
  #hdr h1 { font-family: 'IBM Plex Sans', sans-serif; font-size: 16px; font-weight: 700; color: var(--g); }
  #hdr .meta { color: var(--muted); font-size: 10px; line-height: 1.5; }
  #hdr .sp { flex: 1; }
  #hdr button { background: var(--s3); border: 1px solid var(--border); color: var(--muted); padding: 6px 14px; border-radius: 6px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; cursor: pointer; }
  #hdr button:hover { border-color: var(--g); color: var(--g); }

  #dz { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: calc(100vh - 57px); gap: 10px; border: 2px dashed var(--border); margin: 16px; border-radius: 10px; background: var(--s1); cursor: pointer; text-align: center; padding: 40px 20px; transition: border-color .2s; }
  #dz:hover, #dz.over { border-color: var(--g); background: rgba(58,255,180,.03); }
  #dz .ico { font-size: 36px; }
  #dz h2 { font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; font-weight: 600; }
  #dz p { color: var(--muted); font-size: 11px; line-height: 1.7; }
  #dz .btn { margin-top: 8px; padding: 8px 22px; background: var(--g); color: #000; border: none; border-radius: 7px; font-family: 'IBM Plex Sans', sans-serif; font-weight: 700; font-size: 12px; cursor: pointer; }
  
  #fin { display: none; }
  #app { display: none; padding-bottom: 40px; }

  #cards { display: flex; gap: 8px; padding: 12px 14px; overflow-x: auto; scrollbar-width: none; }
  #cards::-webkit-scrollbar { display: none; }
  .card { flex-shrink: 0; min-width: 90px; background: var(--s1); border: 1px solid var(--border); border-radius: 8px; padding: 9px 14px; }
  .card .lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: .7px; }
  .card .val { font-size: 17px; font-family: 'IBM Plex Sans', sans-serif; font-weight: 700; margin-top: 2px; }
  .card .sub { font-size: 9px; color: var(--muted); margin-top: 1px; }
  
  .cg { border-top: 2px solid var(--g); } .cg .val { color: var(--g); }
  .cb { border-top: 2px solid var(--b); } .cb .val { color: var(--b); }
  .cy { border-top: 2px solid var(--y); } .cy .val { color: var(--y); }
  .cr { border-top: 2px solid var(--r); } .cr .val { color: var(--r); }
  .cp { border-top: 2px solid var(--p); } .cp .val { color: var(--p); }
  .co { border-top: 2px solid #ff9a3c; } .co .val { color: #ff9a3c; }
  .crd { border-top: 2px solid #a1ff3c; } .crd .val { color: #a1ff3c; }
  .cw .val { color: var(--text); }

  .sec { padding: 0 14px 12px; }
  .sec-hd { display: flex; align-items: center; gap: 10px; margin-bottom: 7px; flex-wrap: wrap; }
  .sec-hd h2 { font-family: 'IBM Plex Sans', sans-serif; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; }

  .legend { display: flex; gap: 10px; flex-wrap: wrap; }
  .leg { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--muted); cursor: pointer; padding: 2px 6px; border-radius: 4px; border: 1px solid transparent; }
  .leg:hover { border-color: var(--border); }
  .leg.off { opacity: .3; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }

  select { background: var(--s2); border: 1px solid var(--border); color: var(--text); padding: 5px 8px; border-radius: 6px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; cursor: pointer; outline: none; }
  select:focus { border-color: var(--g); }

  .cbox { background: var(--s1); border: 1px solid var(--border); border-radius: 10px; padding: 12px 10px 4px; position: relative; }
  .cbox canvas { display: block; width: 100% !important; touch-action: none; cursor: crosshair; }
  .hint { text-align: center; font-size: 9px; color: var(--faint); margin-top: 3px; }

  #selbar { display: none; margin: 0 14px 10px; padding: 10px 14px; background: var(--s2); border: 1px solid var(--border); border-radius: 8px; flex-wrap: wrap; gap: 12px; align-items: flex-start; }
  #selbar.on { display: flex; }
  .ss { display: flex; flex-direction: column; gap: 1px; }
  .ss .l { font-size: 9px; color: var(--muted); text-transform: uppercase; }
  .ss .v { font-size: 12px; font-weight: 500; }
  #selclear { margin-left: auto; align-self: center; font-size: 10px; color: var(--muted); background: none; border: 1px solid var(--border); padding: 4px 10px; border-radius: 5px; cursor: pointer; font-family: 'IBM Plex Mono', monospace; }
  #selclear:hover { color: var(--g); border-color: var(--g); }

  .ovbox { background: var(--s1); border: 1px solid var(--border); border-radius: 10px; padding: 6px 8px 2px; }
  .ovbox canvas { display: block; width: 100% !important; touch-action: none; cursor: col-resize; }
  .zlegend { display: flex; gap: 8px; flex-wrap: wrap; margin-left: auto; }
  .zl { font-size: 9px; color: var(--muted); }

  .twrap { overflow: auto; max-height: 200px; background: var(--s1); border: 1px solid var(--border); border-radius: 10px; }
  table { width: 100%; border-collapse: collapse; font-size: 10px; white-space: nowrap; }
  thead th { position: sticky; top: 0; background: var(--s2); color: var(--muted); padding: 7px 10px; border-bottom: 1px solid var(--border); text-align: right; font-size: 9px; text-transform: uppercase; letter-spacing: .4px; }
  thead th:first-child { text-align: left; }
  tbody tr { border-bottom: 1px solid var(--dim); }
  tbody tr:hover td { background: var(--s2); }
  tbody tr.hl td { background: rgba(58,255,180,.06) !important; }
  tbody td { padding: 5px 10px; color: var(--muted); text-align: right; }
  tbody td:first-child { color: var(--text); text-align: left; }

  @media (max-width:600px) {
    #cards { padding: 10px 10px; }
    .sec { padding: 0 10px 10px; }
    #selbar { margin: 0 10px 10px; }
  }
</style>
</head>
<body>
<h1>test</h1>
</body>
</html>
